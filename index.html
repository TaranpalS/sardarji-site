<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SardarJi Trading Co.</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', Arial;
  color:#111;
  background:#f5f5f5;
}

/* subtle texture */
body::before {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: linear-gradient(120deg, rgba(0,0,0,0.02), transparent);
  z-index:-1;
}

header {
  padding:15px;
  text-align:center;
  background:#fff;
  border-bottom:1px solid #eee;
}

header h1 {
  margin:0;
  font-size:20px;
  letter-spacing:2px;
}

nav {
  margin-top:8px;
}

nav a {
  color:#555;
  margin:0 10px;
  text-decoration:none;
  font-size:13px;
}

nav a:hover {
  color:#000;
}

.hero {
  padding:50px 15px;
  text-align:center;
}

.hero h2 {
  font-size:22px;
}

.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  background:#fff;
  border:1px solid #eee;
  padding:15px;
  border-radius:12px;
  transition:0.3s;
}

.card img {
  width:100%;
  aspect-ratio:3/4;
  object-fit:cover;
  border-radius:8px;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

button {
  background:#111;
  color:#fff;
  border:none;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
  cursor:pointer;
}

.tracking {
  padding:40px 15px;
  text-align:center;
  background:#fff;
  margin-top:20px;
}

input {
  padding:12px;
  width:90%;
  max-width:300px;
  border:1px solid #ddd;
  border-radius:6px;
  margin-bottom:10px;
}

.track-btn {
  background:#000;
  color:#fff;
}

.copy-btn {
  background:#eee;
  color:#000;
  margin-top:8px;
  padding:6px 10px;
  font-size:12px;
}

#result .order-card {
  background:#fff;
  border:1px solid #eee;
  padding:15px;
  margin:10px auto;
  max-width:320px;
  border-radius:10px;
  text-align:left;
}

.footer {
  text-align:center;
  padding:15px;
  font-size:12px;
  color:#666;
}

/* mobile */
@media (max-width:600px){
  .products {grid-template-columns:1fr;}
  input, button {width:90%;}
}
</style>
</head>

<body>

<header>
  <h1>SARDARJI TRADING CO.</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#products">Shop</a>
    <a href="#track">Track</a>
  </nav>
</header>

<section class="hero">
  <h2>Built for Comfort. Designed for Style</h2>
</section>

<section id="products" class="products">

  <div class="card">
    <img src="shirt.jpg">
    <h3>Shirt</h3>
    <a href="https://wa.me/918780797185?text=I want to order Shirt" target="_blank">
      <button>Order on WhatsApp</button>
    </a>
  </div>

  <div class="card">
    <img src="tshirt.jpg">
    <h3>T-Shirt</h3>
    <a href="https://wa.me/918780797185?text=I want to order T-Shirt" target="_blank">
      <button>Order on WhatsApp</button>
    </a>
  </div>

  <div class="card">
    <img src="pant.jpg">
    <h3>Linen Pants</h3>
    <a href="https://wa.me/918780797185?text=I want to order Pants" target="_blank">
      <button>Order on WhatsApp</button>
    </a>
  </div>

</section>

<section id="track" class="tracking">
  <h2>Track Your Order</h2>

  <input type="text" id="query" placeholder="Enter Phone Number">
  <button class="track-btn" onclick="track()">Track</button>

  <div id="result"></div>
</section>

<div class="footer">
  © 2018 SardarJi Trading Co.
</div>

<script>
function copyTracking(id) {
  navigator.clipboard.writeText(id);
  alert("Tracking ID copied: " + id);
}

function track() {
  let query = document.getElementById("query").value.trim();

  if (!query) {
    document.getElementById("result").innerHTML = "Enter phone number";
    return;
  }

  document.getElementById("result").innerHTML = "Loading...";

  fetch("https://script.google.com/macros/s/AKfycbwWQb1dmtCfyAsshla0cuWKJ6qM1bBHr3SK1uQZd0uYDY4F_jzzTbU8ly7XuIFmfX3F/exec?query=" + query)
    .then(res => res.json())
    .then(data => {
      if (data.length === 0) {
        document.getElementById("result").innerHTML = "No order found";
        return;
      }

      let output = "";

      data.forEach(o => {
        output += `
          <div class="order-card">
            <p><b>Name:</b> ${o.CustomerName}</p>
            <p><b>Pincode:</b> ${o.Pincode}</p>
            <p><b>Courier:</b> ${o.Courier}</p>
            <p><b>Tracking ID:</b> ${o.Tracking}</p>
            <button class="copy-btn" onclick="copyTracking('${o.Tracking}')">Copy Tracking ID</button>
          </div>
        `;
      });

      document.getElementById("result").innerHTML = output;
    });
}
</script>

</body>
</html>
